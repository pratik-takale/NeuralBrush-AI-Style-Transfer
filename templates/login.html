
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NeuralBrush</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Segoe UI',sans-serif;
            overflow:hidden;

            background:
            linear-gradient(
                135deg,
                #0f172a,
                #111827,
                #1e1b4b
            );
        }

        body::before{
            content:'';
            position:absolute;
            width:700px;
            height:700px;
            background:
            radial-gradient(
                circle,
                rgba(129,140,248,.25),
                transparent 70%
            );
            top:-200px;
            left:-150px;
        }

        body::after{
            content:'';
            position:absolute;
            width:600px;
            height:600px;
            background:
            radial-gradient(
                circle,
                rgba(192,132,252,.25),
                transparent 70%
            );
            bottom:-150px;
            right:-100px;
        }

        .login-card{

            width:430px;

            padding:40px;

            border-radius:25px;

            background:
            rgba(255,255,255,.08);

            backdrop-filter:blur(20px);

            border:
            1px solid rgba(255,255,255,.12);

            box-shadow:
            0 0 40px rgba(129,140,248,.25);

            position:relative;

            z-index:10;
        }

        .logo{

            text-align:center;

            font-size:42px;

            font-weight:700;

            margin-bottom:10px;

            background:
            linear-gradient(
                90deg,
                #818cf8,
                #c084fc
            );

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .subtitle{

            text-align:center;

            color:#cbd5e1;

            margin-bottom:30px;
        }

        .form-control{

            background:
            rgba(255,255,255,.08);

            border:none;

            color:white;

            padding:14px;

            border-radius:12px;

            margin-bottom:18px;
        }

        .form-control:focus{

            background:
            rgba(255,255,255,.12);

            color:white;

            border:
            1px solid #818cf8;

            box-shadow:none;
        }

        .form-control::placeholder{
            color:#cbd5e1;
        }

        .login-btn{

            width:100%;

            padding:14px;

            border:none;

            border-radius:12px;

            font-size:18px;

            font-weight:600;

            color:white;

            background:
            linear-gradient(
                90deg,
                #818cf8,
                #c084fc
            );

            transition:.3s;
        }

        .login-btn:hover{

            transform:translateY(-3px);

            box-shadow:
            0 0 25px rgba(129,140,248,.6);
        }

        .register-link{

            margin-top:25px;

            text-align:center;

            color:#cbd5e1;
        }

        .register-link a{

            color:#818cf8;

            text-decoration:none;

            font-weight:600;
        }

        .register-link a:hover{
            color:#c084fc;
        }

    </style>

</head>

<body>

    <div class="login-card">

        <div class="logo">
            NeuralBrush
        </div>

        <div class="subtitle">
            AI Powered Neural Style Transfer
        </div>

        <form method="POST">

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter Email"
                required
            >

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter Password"
                required
            >

            <button
                type="submit"
                class="login-btn"
            >
                Login
            </button>

        </form>

        <div class="register-link">

            New User?

            <a href="{{ url_for('register') }}">
                Create Account
            </a>

        </div>

    </div>

</body>
</html>
