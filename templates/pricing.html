<!DOCTYPE html>
<html>
<head>

<title>Pricing</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <h1 class="text-center mb-5">
        Pricing Plans
    </h1>

    <div class="row">

        <div class="col-md-4">

            <div class="card bg-secondary p-4">

                <h3>Free</h3>

                <h2>₹0</h2>

                <p>
                    5 generations per day
                </p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card bg-primary p-4">

                <h3>Pro</h3>

                <h2>₹499/month</h2>

                <p>
                    Unlimited generations
                </p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card bg-secondary p-4">

                <h3>Enterprise</h3>

                <h2>Custom</h2>

                <p>
                    API access and deployment
                </p>

            </div>

        </div>

    </div>

</div>

</body>
</html>
