
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register - NeuralBrush</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            font-family:'Segoe UI',sans-serif;

            background:
            linear-gradient(
                135deg,
                #0f172a,
                #111827,
                #1e1b4b
            );
        }

        body::before{
            content:'';
            position:absolute;
            width:800px;
            height:800px;
            border-radius:50%;

            background:
            radial-gradient(
                circle,
                rgba(129,140,248,.25),
                transparent 70%
            );

            top:-300px;
            left:-250px;
        }

        body::after{
            content:'';
            position:absolute;
            width:700px;
            height:700px;
            border-radius:50%;

            background:
            radial-gradient(
                circle,
                rgba(192,132,252,.25),
                transparent 70%
            );

            bottom:-250px;
            right:-200px;
        }

        .register-card{

            width:450px;

            padding:40px;

            border-radius:25px;

            background:
            rgba(255,255,255,.08);

            backdrop-filter:blur(20px);

            border:
            1px solid rgba(255,255,255,.12);

            box-shadow:
            0 0 40px rgba(129,140,248,.25);

            z-index:10;
        }

        .logo{

            text-align:center;

            font-size:42px;

            font-weight:700;

            margin-bottom:8px;

            background:
            linear-gradient(
                90deg,
                #818cf8,
                #c084fc
            );

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .subtitle{

            text-align:center;

            color:#cbd5e1;

            margin-bottom:30px;
        }

        .form-control{

            background:
            rgba(255,255,255,.08);

            border:none;

            color:white;

            padding:14px;

            margin-bottom:18px;

            border-radius:12px;
        }

        .form-control:focus{

            background:
            rgba(255,255,255,.12);

            border:
            1px solid #818cf8;

            box-shadow:none;

            color:white;
        }

        .form-control::placeholder{
            color:#cbd5e1;
        }

        .register-btn{

            width:100%;

            padding:14px;

            border:none;

            border-radius:12px;

            font-size:18px;

            font-weight:600;

            color:white;

            background:
            linear-gradient(
                90deg,
                #818cf8,
                #c084fc
            );

            transition:.3s;
        }

        .register-btn:hover{

            transform:translateY(-3px);

            box-shadow:
            0 0 25px rgba(129,140,248,.6);
        }

        .login-link{

            margin-top:25px;

            text-align:center;

            color:#cbd5e1;
        }

        .login-link a{

            color:#818cf8;

            text-decoration:none;

            font-weight:600;
        }

        .login-link a:hover{
            color:#c084fc;
        }

        .network-dot{

            position:absolute;

            width:6px;

            height:6px;

            background:#818cf8;

            border-radius:50%;

            opacity:.4;
        }

    </style>

</head>

<body>

    <div class="register-card">

        <div class="logo">
            NeuralBrush
        </div>

        <div class="subtitle">
            Create Your AI Art Account
        </div>

        <form method="POST">

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Username"
                required
            >

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Password"
                required
            >

            <button
                type="submit"
                class="register-btn"
            >
                Create Account
            </button>

        </form>

        <div class="login-link">

            Already have an account?

            <a href="{{ url_for('login') }}">
                Login Here
            </a>

        </div>

    </div>

</body>

</html>
